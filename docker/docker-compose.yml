services:
  db:
    image: postgres:15
    container_name: rohbauabnahme-db
    environment:
      POSTGRES_DB: rohbauabnahme
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: python:3.12-slim
    container_name: rohbauabnahme-backend
    working_dir: /app
    volumes:
      - ../backend:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    container_name: rohbauabnahme-frontend
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
