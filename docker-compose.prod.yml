services:
  traefik:
    image: traefik:v3.1
    container_name: rohbauabnahme-traefik
    command:
      - --configFile=/etc/traefik/traefik.yml
      - --certificatesresolvers.${TRAEFIK_CERTRESOLVER}.acme.tlschallenge=true
      - --certificatesresolvers.${TRAEFIK_CERTRESOLVER}.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.${TRAEFIK_CERTRESOLVER}.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - traefik-public
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: rohbauabnahme-db-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend-internal
    restart: unless-stopped

  backend:
    image: python:3.11-slim
    container_name: rohbauabnahme-backend-prod
    working_dir: /app
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LOG_LEVEL: ${LOG_LEVEL}
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.rohbau-backend.rule=Host(`${API_DOMAIN}`)
      - traefik.http.routers.rohbau-backend.entrypoints=websecure
      - traefik.http.routers.rohbau-backend.tls=true
      - traefik.http.routers.rohbau-backend.tls.certresolver=${TRAEFIK_CERTRESOLVER}
      - traefik.http.services.rohbau-backend.loadbalancer.server.port=8000
    networks:
      - backend-internal
      - traefik-public
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: rohbauabnahme-frontend-prod
    working_dir: /app
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      NODE_ENV: production
    command: >
      sh -c "npm ci && npm run build &&
      npm run preview -- --host 0.0.0.0 --port 4173"
    volumes:
      - ./frontend:/app
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4173 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.rohbau-frontend.rule=Host(`${FRONTEND_DOMAIN}`)
      - traefik.http.routers.rohbau-frontend.entrypoints=websecure
      - traefik.http.routers.rohbau-frontend.tls=true
      - traefik.http.routers.rohbau-frontend.tls.certresolver=${TRAEFIK_CERTRESOLVER}
      - traefik.http.services.rohbau-frontend.loadbalancer.server.port=4173
    networks:
      - traefik-public
    restart: unless-stopped

volumes:
  postgres_data:
  traefik_letsencrypt:

networks:
  traefik-public:
    name: traefik-public
  backend-internal:
    name: backend-internal
    internal: true
