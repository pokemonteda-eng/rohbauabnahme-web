name: E2E Tests

on:
  pull_request:

jobs:
  playwright-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --workspace frontend

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Prepare environment
        run: cp .env.example .env

      - name: Start services with Docker Compose
        run: docker compose up -d db backend frontend

      - name: Wait for healthy services
        run: |
          set -euo pipefail

          wait_for_container() {
            local container_name="$1"
            local max_retries=45
            local sleep_seconds=4
            local status=""

            for _ in $(seq 1 "${max_retries}"); do
              status=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${container_name}" 2>/dev/null || true)
              if [ "${status}" = "healthy" ] || [ "${status}" = "running" ]; then
                echo "${container_name} is ${status}"
                return 0
              fi
              sleep "${sleep_seconds}"
            done

            echo "Timed out waiting for ${container_name}. Current status: ${status}"
            docker compose ps
            docker compose logs --no-color
            exit 1
          }

          wait_for_container "rohbauabnahme-db"
          wait_for_container "rohbauabnahme-backend"
          wait_for_container "rohbauabnahme-frontend"

      - name: Run Playwright smoke tests
        working-directory: frontend
        env:
          CI: "true"
          BASE_URL: http://localhost:5173
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: ignore

      - name: Print Docker logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Shutdown services
        if: always()
        run: docker compose down -v
