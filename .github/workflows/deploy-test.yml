name: Deploy to Test Server

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image names
        id: vars
        run: |
          REPO_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "backend_image=ghcr.io/${REPO_LOWER}/backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${REPO_LOWER}/frontend" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.backend_image }}:test-latest
            ${{ steps.vars.outputs.backend_image }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.frontend_image }}:test-latest
            ${{ steps.vars.outputs.frontend_image }}:${{ github.sha }}

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TEST_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        env:
          TEST_SSH_HOST: ${{ secrets.TEST_SSH_HOST }}
          TEST_SSH_PORT: ${{ secrets.TEST_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${TEST_SSH_PORT:-22}" "$TEST_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to test server with docker compose
        env:
          TEST_SSH_HOST: ${{ secrets.TEST_SSH_HOST }}
          TEST_SSH_PORT: ${{ secrets.TEST_SSH_PORT }}
          TEST_SSH_USER: ${{ secrets.TEST_SSH_USER }}
          TEST_DEPLOY_PATH: ${{ secrets.TEST_DEPLOY_PATH }}
          TEST_GHCR_USERNAME: ${{ secrets.TEST_GHCR_USERNAME }}
          TEST_GHCR_TOKEN: ${{ secrets.TEST_GHCR_TOKEN }}
          BACKEND_IMAGE: ${{ steps.vars.outputs.backend_image }}:${{ github.sha }}
          FRONTEND_IMAGE: ${{ steps.vars.outputs.frontend_image }}:${{ github.sha }}
        run: |
          ssh -p "${TEST_SSH_PORT:-22}" "${TEST_SSH_USER}@${TEST_SSH_HOST}" \
            "export TEST_DEPLOY_PATH='${TEST_DEPLOY_PATH}'; \
             export TEST_GHCR_USERNAME='${TEST_GHCR_USERNAME}'; \
             export TEST_GHCR_TOKEN='${TEST_GHCR_TOKEN}'; \
             export BACKEND_IMAGE='${BACKEND_IMAGE}'; \
             export FRONTEND_IMAGE='${FRONTEND_IMAGE}'; \
             bash -s" <<'REMOTE'
            set -euo pipefail
            cd "$TEST_DEPLOY_PATH"

            echo "$TEST_GHCR_TOKEN" | docker login ghcr.io -u "$TEST_GHCR_USERNAME" --password-stdin

            cat > docker-compose.override.ci.yml <<OVERRIDE
            services:
              backend:
                image: ${BACKEND_IMAGE}
                build: null
              frontend:
                image: ${FRONTEND_IMAGE}
                build: null
            OVERRIDE

            docker compose -f docker-compose.yml -f docker-compose.override.ci.yml pull backend frontend
            docker compose -f docker-compose.yml -f docker-compose.override.ci.yml up -d backend frontend
            docker compose -f docker-compose.yml -f docker-compose.override.ci.yml ps
REMOTE

      - name: Health check on test server
        env:
          TEST_SSH_HOST: ${{ secrets.TEST_SSH_HOST }}
          TEST_SSH_PORT: ${{ secrets.TEST_SSH_PORT }}
          TEST_SSH_USER: ${{ secrets.TEST_SSH_USER }}
          TEST_BACKEND_HEALTH_URL: ${{ secrets.TEST_BACKEND_HEALTH_URL }}
          TEST_FRONTEND_HEALTH_URL: ${{ secrets.TEST_FRONTEND_HEALTH_URL }}
        run: |
          ssh -p "${TEST_SSH_PORT:-22}" "${TEST_SSH_USER}@${TEST_SSH_HOST}" \
            "export TEST_BACKEND_HEALTH_URL='${TEST_BACKEND_HEALTH_URL:-http://localhost:8000/health}'; \
             export TEST_FRONTEND_HEALTH_URL='${TEST_FRONTEND_HEALTH_URL:-http://localhost:5173}'; \
             bash -s" <<'REMOTE'
            set -euo pipefail

            for i in $(seq 1 30); do
              if curl -fsS "$TEST_BACKEND_HEALTH_URL" >/dev/null && curl -fsS "$TEST_FRONTEND_HEALTH_URL" >/dev/null; then
                echo "Health check passed"
                exit 0
              fi
              echo "Waiting for services... ($i/30)"
              sleep 5
            done

            echo "Health check failed"
            exit 1
REMOTE
