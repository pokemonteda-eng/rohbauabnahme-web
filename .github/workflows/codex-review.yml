name: codex-review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@codex review'))
    runs-on: ubuntu-latest

    steps:
      - name: Resolve PR data
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let pr;
            if (context.eventName === 'pull_request') {
              pr = context.payload.pull_request;
            } else {
              const issue_number = context.payload.issue.number;
              const res = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: issue_number,
              });
              pr = res.data;
            }
            core.setOutput('number', String(pr.number));
            core.setOutput('base_sha', pr.base.sha);
            core.setOutput('head_sha', pr.head.sha);

      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0

      - name: Build prompt
        run: |
          cat .github/codex/review_prompt.md > codex_prompt.md
          echo "" >> codex_prompt.md
          echo "PR #${{ steps.pr.outputs.number }}" >> codex_prompt.md
          echo "Base: ${{ steps.pr.outputs.base_sha }}" >> codex_prompt.md
          echo "Head: ${{ steps.pr.outputs.head_sha }}" >> codex_prompt.md
          echo "" >> codex_prompt.md
          echo "Geaenderte Dateien:" >> codex_prompt.md
          git diff --name-only ${{ steps.pr.outputs.base_sha }} ${{ steps.pr.outputs.head_sha }} | sed 's/^/- /' >> codex_prompt.md

      - name: Run Codex review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: codex_prompt.md

      - name: Post review comment
        uses: actions/github-script@v7
        env:
          CODEX_TEXT: ${{ steps.codex.outputs.final-message }}
        with:
          script: |
            const body = process.env.CODEX_TEXT && process.env.CODEX_TEXT.trim().length
              ? process.env.CODEX_TEXT
              : 'Codex-Review abgeschlossen, aber ohne Text-Output. Bitte Workflow-Logs pruefen.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.pr.outputs.number }}'),
              body,
            });
