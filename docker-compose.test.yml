services:
  db_test:
    image: postgres:15-alpine
    container_name: rohbauabnahme-db-test
    environment:
      POSTGRES_DB: ${TEST_POSTGRES_DB:-rohbauabnahme_test}
      POSTGRES_USER: ${TEST_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${TEST_POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - rohbauabnahme-test-net

volumes:
  postgres_test_data:

networks:
  rohbauabnahme-test-net:
    name: rohbauabnahme-test-net
